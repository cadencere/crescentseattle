<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crescent Apartments | Coming Soon</title>
    <meta name="description" content="Crescent Apartments in Columbia City, Seattle. Coming soon.">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta property="og:title" content="Crescent Apartments | Coming Soon">
    <meta property="og:description" content="A new home in Columbia City, Seattle. Coming soon.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://crescentseattle.com">
    <meta property="og:image" content="https://crescentseattle.com/og-image.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://crescentseattle.com/og-image.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@200;300;400;500;600;700&family=Hind:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --forest: #1E3B2F;
            --deep-green: #2D5A3F;
            --sage: #6B8F71;
            --moss: #8AAD7E;
            --mint: #B8CEAB;
            --light-mint: #D4E4CC;
            --cream: #F4F0E6;
            --warm-white: #FAFAF6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html { height: 100%; }

        body {
            min-height: 100%;
            font-family: 'Hind', sans-serif;
            color: var(--warm-white);
            background: var(--forest);
            -webkit-font-smoothing: antialiased;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at center, rgba(139, 173, 126, 0.18) 0%, transparent 65%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 20% 30%, rgba(107, 143, 113, 0.12) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(45, 90, 63, 0.20) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 80px 24px 40px;
            position: relative;
            z-index: 2;
        }

        .container {
            text-align: center;
            max-width: 640px;
            width: 100%;
        }

        .logo {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            line-height: 1;
            margin-bottom: 56px;
        }

        .logo-top {
            font-family: 'Heebo', sans-serif;
            font-size: 32px;
            font-weight: 200;
            color: var(--warm-white);
            letter-spacing: 10px;
        }

        .logo-accent {
            color: var(--moss);
        }

        .logo-bottom {
            font-family: 'Heebo', sans-serif;
            font-size: 10px;
            font-weight: 300;
            color: var(--mint);
            letter-spacing: 6px;
            margin-top: 8px;
            opacity: 0.85;
        }

        .tagline {
            font-family: 'Heebo', sans-serif;
            font-size: 14px;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--mint);
            margin-bottom: 24px;
            opacity: 0.85;
        }

        h1 {
            font-family: 'Heebo', sans-serif;
            font-size: clamp(40px, 7vw, 64px);
            font-weight: 200;
            line-height: 1.1;
            letter-spacing: -1px;
            margin-bottom: 32px;
            color: var(--warm-white);
        }

        .lede {
            font-family: 'Hind', sans-serif;
            font-size: 17px;
            font-weight: 400;
            line-height: 1.6;
            color: rgba(250, 250, 246, 0.75);
            max-width: 480px;
            margin: 0 auto 48px;
        }

        .contact {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-family: 'Hind', sans-serif;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.5px;
            color: var(--mint);
            text-decoration: none;
            padding: 14px 28px;
            border: 1px solid rgba(184, 206, 171, 0.4);
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        .contact:hover {
            background: rgba(184, 206, 171, 0.08);
            border-color: var(--mint);
            color: var(--warm-white);
        }

        .footer-mark {
            text-align: center;
            padding: 24px 24px 32px;
            font-family: 'Hind', sans-serif;
            font-size: 11px;
            font-weight: 400;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(184, 206, 171, 0.5);
            position: relative;
            z-index: 2;
        }

        .footer-mark a {
            color: inherit;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .footer-mark a:hover {
            color: var(--mint);
        }

        @media (max-width: 600px) {
            .main { padding: 56px 20px 32px; }
            .logo { margin-bottom: 40px; }
            .logo-top { font-size: 22px; letter-spacing: 7px; }
            .logo-bottom { font-size: 8px; letter-spacing: 4px; }
            .tagline { font-size: 12px; letter-spacing: 3px; margin-bottom: 18px; }
            h1 { font-size: 38px; margin-bottom: 24px; }
            .lede { font-size: 15px; line-height: 1.55; margin-bottom: 36px; }
            .contact { font-size: 13px; padding: 13px 24px; }
            .footer-mark { font-size: 10px; letter-spacing: 1.5px; padding: 16px 20px 24px; }
        }

        @media (max-width: 380px) {
            .logo-top { font-size: 19px; letter-spacing: 6px; }
            h1 { font-size: 32px; }
            .lede { font-size: 14px; }
        }
    </style>
</head>
<body>
    <main class="main">
        <div class="container">
            <div class="logo">
                <div class="logo-top">CRES<span class="logo-accent">CENT</span></div>
                <div class="logo-bottom">SEATTLE</div>
            </div>

            <div class="tagline">Columbia City</div>
            <h1>Coming soon.</h1>
            <p class="lede">A new home in one of Seattle's most loved neighborhoods. We're putting the finishing touches on something special.</p>

            <a href="mailto:crescent@peaklivingps.com?subject=Crescent%20Apartments%20-%20Inquiry" class="contact">
                Get on the list
            </a>
        </div>
    </main>

    <div class="footer-mark">
        A <a href="https://www.cadencere.com" target="_blank" rel="noopener">Cadence</a> property
    </div>
</body>
</html>
